            function drawSpaceInvaderTransform(sprite, targetX, targetY, degree, scaleFactor) {
                const rad = degree * (Math.PI / 180);
                const spriteH = sprite.length;
                const spriteW = sprite[0].length;
                const centerX = spriteW / 2;
                const centerY = spriteH / 2;

                const maxDim = Math.max(spriteW, spriteH) * scaleFactor * 1.5;
                for (let screenY = Math.floor(targetY - maxDim); screenY <= Math.ceil(targetY + maxDim); screenY++) {
                    for (let screenX = Math.floor(targetX - maxDim); screenX <= Math.ceil(targetX + maxDim); screenX++) {
                        const tx = screenX - targetX; const ty = screenY - targetY;
                        const sx = tx / scaleFactor; const sy = ty / scaleFactor;
                        const origX = sx * Math.cos(rad) + sy * Math.sin(rad);
                        const origY = -sx * Math.sin(rad) + sy * Math.cos(rad);
                        const srcI = Math.round(origX + centerX);
                        const srcJ = Math.round(origY + centerY);

                        if (srcI >= 0 && srcI < spriteW && srcJ >= 0 && srcJ < spriteH) {
                            if (sprite[srcJ][srcI] === 1) {
                                putPixel(screenX, screenY, 255, 0, 0);
                            }
                        }
                    }
                }
            }

                } else if (event.key === 'ArrowUp') {
                    spriteY -= 5;
                } else if (event.key === 'ArrowDown') {
                    spriteY += 5;
                }
                
                //Rotate
                if (event.key === 'a' || event.key === 'A') {
                    degree -= 5; //ซ้าย
                } else if (event.key === 'd' || event.key === 'D') {
                    degree += 5; //ขวา
                }
                
                //Scale
                if (event.key === 'w' || event.key === 'W') {
                    scale += 0.5; //ขยาย
                } else if (event.key === 's' || event.key === 'S') {
                    scale = Math.max(0.5, scale - 0.1); //ย่อลง
                }
            });

            function animate() {
                drawRectFilled(0, 0, canvas.width - 1, canvas.height - 1, 255, 255, 255);//ฉากหลังสีขาว
                
                drawLine(0, 100, canvas.width - 1, 100, 0, 0, 0);//แกน X แนวนอน
                drawLine(100, 0, 100, canvas.height - 1, 0, 0, 0);//แกน Y แนวตั้ง

                if (activeSprite === '1') {
                    drawSpaceInvaderTransform(spaceInvaderSprite, spriteX, spriteY, degree, scale);
                } else if (activeSprite === '2') {
                    drawSprite24BitTransform(smileSprite24Bit, spriteX, spriteY, degree, scale);
                } else if (activeSprite === '3') {
                    drawSprite24BitTransform(smileSprite24Bit32x32, spriteX, spriteY, degree, scale);
                }

                ctx.putImageData(imageData, 0, 0);
                requestAnimationFrame(animate);
            }
            animate();
        </script>
    </body>
</html>
